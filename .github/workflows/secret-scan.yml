name: Secret Scan

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret pattern scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan working tree and Git history
        run: |
          python3 - <<'PY'
          import re
          import subprocess
          from pathlib import Path

          patterns = [
              ("private_key", re.compile(r"-----BEGIN (?:RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY-----")),
              ("aws_access_key", re.compile(r"\b(?:AKIA|ASIA)[0-9A-Z]{16}\b")),
              ("google_api_key", re.compile(r"\bAIza[0-9A-Za-z_\-]{35}\b")),
              ("openai_key", re.compile(r"\bsk-(?:proj-)?[A-Za-z0-9_\-]{20,}\b")),
              ("anthropic_key", re.compile(r"\bsk-ant-[A-Za-z0-9_\-]{20,}\b")),
              ("github_token", re.compile(r"\b(?:ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9_]{20,}\b|\bgithub_pat_[A-Za-z0-9_]{20,}\b")),
              ("slack_token", re.compile(r"\bxox[baprs]-[A-Za-z0-9\-]{10,}\b")),
              ("sendgrid_key", re.compile(r"\bSG\.[A-Za-z0-9_\-]{15,}\.[A-Za-z0-9_\-]{15,}\b")),
              ("jwt_token", re.compile(r"\beyJ[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\b")),
              ("basic_auth_url", re.compile(r"https?://[^/\s:@]+:[^/\s:@]+@")),
          ]

          def is_binary(data):
              return b"\0" in data[:4096]

          def scan_text(label, path, text, results):
              for name, rx in patterns:
                  if rx.search(text):
                      results.append(f"{label}: {path}: {name}")

          results = []
          files = subprocess.check_output(["git", "ls-files", "-z"]).decode().split("\0")
          for rel in [f for f in files if f]:
              path = Path(rel)
              if not path.exists():
                  continue
              data = path.read_bytes()
              if len(data) <= 2_000_000 and not is_binary(data):
                  scan_text("worktree", rel, data.decode("utf-8", "ignore"), results)

          objects = subprocess.check_output(["git", "rev-list", "--objects", "--all"], text=True, errors="ignore")
          seen = set()
          for line in objects.splitlines():
              if not line.strip():
                  continue
              parts = line.split(" ", 1)
              oid = parts[0]
              path = parts[1] if len(parts) > 1 else oid
              if oid in seen:
                  continue
              seen.add(oid)
              try:
                  if subprocess.check_output(["git", "cat-file", "-t", oid], text=True).strip() != "blob":
                      continue
                  size = int(subprocess.check_output(["git", "cat-file", "-s", oid], text=True).strip())
                  if size > 2_000_000:
                      continue
                  data = subprocess.check_output(["git", "cat-file", "-p", oid])
              except Exception:
                  continue
              if not is_binary(data):
                  scan_text("history", f"{path}@{oid[:8]}", data.decode("utf-8", "ignore"), results)

          if results:
              print("Potential secrets found:")
              print("\n".join(results))
              raise SystemExit(1)

          print("No secret patterns found.")
          PY
