name: IllustratorApp
options:
  bundleIdPrefix: com.loop9
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  IllustratorApp:
    type: application
    platform: iOS
    sources:
      - IllustratorApp
    settings:
      base:
        INFOPLIST_FILE: IllustratorApp/Info.plist
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: "M9H9BY85BH"
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.loop9.IllustratorApp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "NO"
